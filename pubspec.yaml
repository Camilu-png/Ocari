name: ocari
description: Aprende a tocar la ocarina de 12 hoyos de forma visual y sencilla.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # — Navegación
  go_router: ^14.2.0

  # — Gestión de estado
  flutter_riverpod: ^2.5.1

  # — Backend / Auth
  supabase_flutter: ^2.12.4
  google_sign_in: ^6.2.1
  flutter_signin_button: ^2.0.0

  # — Audio
  just_audio: ^0.9.39

  # — Modelos inmutables
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # — Testing
  mocktail: ^1.0.3

  # — Linting
  flutter_lints: ^4.0.0

  # — Generación de código
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/fingerings.json
    - assets/data/songs_index.json
    - assets/data/songs/
    - assets/audio/
