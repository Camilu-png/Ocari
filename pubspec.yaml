name: ocari
description: Aprende a tocar la ocarina de 12 hoyos de forma visual y sencilla.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # — Navegación
  go_router: ^14.2.0

  # — Gestión de estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # — Backend / Auth
  supabase_flutter: ^2.12.4

  # — Audio
  just_audio: ^0.9.39
  audio_session: ^0.1.21

  # — Modelos inmutables
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # — HTTP (para endpoints custom si los necesitas)
  dio: ^5.4.3

  # — Utilidades
  equatable: ^2.0.5
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # — Generadores de código (freezed + riverpod)
  build_runner: ^2.4.9
  freezed: ^2.5.2
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0

  # — Linting
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
